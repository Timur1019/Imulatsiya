spring:
  application:
    name: imulatsiya
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    url: jdbc:h2:file:./data/imulatsiya;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  h2:
    console:
      enabled: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8080
  address: 0.0.0.0

storage:
  upload-dir: ${user.dir}/data/uploads

# CORS — разрешённые origin фронтенда (паттерны Spring)
# На сервере добавьте IP/домен киоска, например: "http://192.168.1.50:*"
app:
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "http://192.168.*:*"
      - "http://10.*:*"
      - "https://*"

bus:
  simulation:
    tick-interval-ms: 1000
